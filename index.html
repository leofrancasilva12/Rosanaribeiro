<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dom Pedrinho – Rosana Ribeiro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --dp-blue:   #1a7fc1;
    --dp-dark:   #0e5a8a;
    --dp-deeper: #083d5e;
    --dp-gold:   #f5a623;
    --white:     #ffffff;
    --light:     #f0f6fb;
    --gray:      #7a9ab5;
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(145deg, #e8f4fd 0%, #d0e8f5 50%, #bdd9ed 100%);
    font-family: 'DM Sans', sans-serif;
    padding: 20px;
  }

  body::before {
    content: '';
    position: fixed;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(26,127,193,.15), transparent 70%);
    top: -150px; right: -150px;
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(245,166,35,.1), transparent 70%);
    bottom: -100px; left: -100px;
    pointer-events: none;
  }

  /* card */
  .card {
    width: 100%;
    max-width: 380px;
    border-radius: 24px;
    overflow: hidden;
    background: #ffffff;
    box-shadow:
      0 0 0 1px rgba(26,127,193,.12),
      0 20px 60px rgba(14,90,138,.2),
      0 4px 16px rgba(0,0,0,.08);
    animation: riseIn .9s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes riseIn {
    from { opacity:0; transform: translateY(40px) scale(.97); }
    to   { opacity:1; transform: translateY(0) scale(1); }
  }

  /* header */
  .card-header {
    position: relative;
    background: var(--dp-blue);
    padding: 0;
    text-align: center;
    overflow: hidden;
    min-height: 220px;
  }
  .card-header::before {
    content: '';
    position: absolute;
    width: 260px; height: 260px;
    border-radius: 50%;
    background: rgba(255,255,255,.06);
    top: -80px; right: -80px;
  }
  .card-header::after {
    content: '';
    position: absolute;
    width: 180px; height: 180px;
    border-radius: 50%;
    background: rgba(245,166,35,.1);
    bottom: 20px; left: -60px;
  }

  .logo-wrap {
    position: relative; z-index: 1;
    width: 100%;
    animation: riseIn 1s .1s both;
  }
  .logo-img {
    width: 100%;
    height: 220px;
    display: block;
    object-fit: cover;
    object-position: center;
  }

  .wave {
    position: absolute;
    bottom: -1px; left: 0; right: 0;
    height: 60px;
    z-index: 2;
  }

  /* body */
  .card-body {
    background: #ffffff;
    padding: 0 28px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .avatar-wrap {
    margin-top: -58px;
    margin-bottom: 18px;
    z-index: 2;
    position: relative;
    animation: riseIn 1s .2s both;
  }
  .avatar-img {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    object-fit: cover;
    object-position: center top;
    border: 4px solid #ffffff;
    box-shadow: 0 0 0 3px rgba(26,127,193,.3), 0 8px 24px rgba(0,0,0,.15);
    display: block;
  }
  .avatar-placeholder {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1a7fc1, #083d5e);
    border: 4px solid #ffffff;
    box-shadow: 0 0 0 3px rgba(26,127,193,.3), 0 8px 24px rgba(0,0,0,.15);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .avatar-placeholder svg {
    width: 48px; height: 48px;
    fill: rgba(255,255,255,.5);
  }

  .person-name {
    font-family: 'Inter', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: #0e5a8a;
    text-align: center;
    line-height: 1.1;
    animation: riseIn 1s .25s both;
  }
  .person-role {
    font-size: 11px;
    font-weight: 500;
    color: var(--dp-gold);
    letter-spacing: 1.6px;
    text-transform: uppercase;
    text-align: center;
    margin-top: 5px;
    margin-bottom: 20px;
    animation: riseIn 1s .3s both;
  }
  .divider {
    width: 36px; height: 2px;
    background: linear-gradient(90deg, var(--dp-gold), transparent);
    margin-bottom: 18px;
    align-self: flex-start;
    animation: expandW .8s .4s both;
  }
  @keyframes expandW {
    from { width:0; opacity:0; }
    to   { width:36px; opacity:1; }
  }

  /* contacts */
  .contacts {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
  }
  .contact-item {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    color: #083d5e;
    padding: 11px 14px;
    border-radius: 12px;
    border: 1px solid rgba(26,127,193,.12);
    background: rgba(26,127,193,.05);
    transition: background .25s, border-color .25s, transform .2s, box-shadow .2s;
    animation: riseIn 1s both;
  }
  .contact-item:nth-child(1) { animation-delay: .35s; }
  .contact-item:nth-child(2) { animation-delay: .42s; }
  .contact-item:nth-child(3) { animation-delay: .49s; }
  .contact-item:hover {
    background: rgba(26,127,193,.12);
    border-color: rgba(26,127,193,.3);
    transform: translateX(4px);
    box-shadow: 0 4px 16px rgba(26,127,193,.15);
  }
  .icon-wrap {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, #1a7fc1, #0e5a8a);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 3px 10px rgba(26,127,193,.3);
    transition: transform .2s;
  }
  .contact-item:hover .icon-wrap { transform: scale(1.1) rotate(-5deg); }
  .icon-wrap svg { width: 17px; height: 17px; fill: #ffffff; }
  .contact-info { display: flex; flex-direction: column; }
  .contact-label {
    font-size: 9px;
    font-weight: 600;
    color: var(--gray);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 1px;
  }
  .contact-value {
    font-size: 13px;
    font-weight: 500;
    color: #083d5e;
    line-height: 1.4;
  }

  /* footer */
  .card-footer {
    background: var(--light);
    padding: 16px 24px 20px;
    border-top: 1px solid rgba(26,127,193,.1);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    animation: riseIn 1s .6s both;
  }
  .footer-badge {
    font-size: 10px;
    color: var(--gray);
    letter-spacing: .8px;
    text-transform: uppercase;
    font-weight: 500;
  }
  .footer-gold-line {
    width: 24px; height: 2px;
    background: var(--dp-gold);
    border-radius: 2px;
  }
  .save-btn {
    cursor: pointer;
    border: 1px solid rgba(245,166,35,.3);
    background: rgba(245,166,35,.08);
    width: 100%;
    text-align: left;
    font-family: inherit;
  }
  .save-btn:hover {
    background: rgba(245,166,35,.18) !important;
    border-color: rgba(245,166,35,.5) !important;
  }
  .save-btn .contact-value {
    color: #083d5e;
    font-weight: 600;
  }
</style>
</head>
<body>

<div class="card">

  <div class="card-header">
    <div class="logo-wrap">
      <img src="img/logo.png" alt="Dom Pedrinho" class="logo-img" />
    </div>
    <svg class="wave" viewBox="0 0 380 60" preserveAspectRatio="none">
      <path d="M0,25 C70,60 140,0 210,30 C280,60 330,10 380,35 L380,60 L0,60 Z" fill="#ffffff"/>
    </svg>
  </div>

  <div class="card-body">

    <div class="avatar-wrap">
      <img src="img/perfil.png" alt="Rosana Ribeiro" class="avatar-img" />
    </div>

    <div class="person-name">Rosana Ribeiro</div>
    <div class="person-role">Coordenadora</div>
    <div class="divider"></div>

    <div class="contacts">

      <a class="contact-item" href="https://wa.me/5571986607153" target="_blank" rel="noopener">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
        </div>
        <div class="contact-info">
          <span class="contact-label">WhatsApp</span>

      </a>

      <a class="contact-item" href="tel:+5571986607153">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>

        </div>

      <a class="contact-item" href="mailto:naudloe12@hotmail.com">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
        </div>
        <div class="contact-info">
          <span class="contact-label">E-mail</span>
          <span class="contact-value">naudloe12@hotmail.com</span>
        </div>
      </a>

      <button class="contact-item save-btn" onclick="salvarContato()">
        <div class="icon-wrap" style="background: linear-gradient(135deg, #f5a623, #e08c00);">
          <svg viewBox="0 0 24 24"><path d="M17 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg>

          <span class="contact-label">Agenda</span>
          <span class="contact-value">Salvar Contato</span>

      </button>

    </div>
  </div>

  <div class="card-footer">
    <div class="footer-gold-line"></div>
    <div class="footer-badge">© 2025 Escola Dom Pedrinho</div>
  </div>

</div>
<script>
function salvarContato() {
  const vcf = [
    "BEGIN:VCARD",
    "VERSION:3.0",
    "FN:Rosana Ribeiro",
    "N:Ribeiro;Rosana;;;",
    "ORG:Escola Dom Pedrinho",
    "TITLE:Coordenadora",
    "TEL;TYPE=CELL,VOICE:+5571986607153",
    "TEL;TYPE=WORK,VOICE:+5571986607153",
    "EMAIL:naudloe12@hotmail.com",
    "END:VCARD"
  ].join("\n");

  const blob = new Blob([vcf], { type: "text/vcard;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "Rosana_Ribeiro.vcf";
  a.click();
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
